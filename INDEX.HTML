<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e0e;
    --surface: #1a1818;
    --surface2: #242020;
    --border: #2e2a2a;
    --red: #e8432d;
    --red-dim: #7a2218;
    --text: #f0ebe6;
    --muted: #6b6260;
    --accent: #f5c842;
    --green: #4caf7d;
    --radius: 16px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: auto 1fr auto;
    gap: 0;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .session-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .session-badge span {
    color: var(--accent);
    font-weight: 500;
  }

  /* LEFT PANEL */
  .left-panel {
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    border-right: 1px solid var(--border);
  }

  /* MODE TABS */
  .mode-tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    gap: 2px;
    width: 100%;
    max-width: 380px;
  }

  .mode-tab {
    flex: 1;
    padding: 8px 12px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 7px;
    cursor: pointer;
    transition: var(--transition);
  }

  .mode-tab.active {
    background: var(--red);
    color: white;
  }

  /* TIMER RING */
  .timer-container {
    position: relative;
    width: 280px;
    height: 280px;
  }

  .timer-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 6;
  }

  .ring-progress {
    fill: none;
    stroke: var(--red);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 754;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
    filter: drop-shadow(0 0 8px rgba(232, 67, 45, 0.5));
  }

  .timer-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .time-display {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .mode-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: var(--transition);
    font-weight: 500;
  }

  .btn-primary {
    background: var(--red);
    color: white;
    padding: 14px 40px;
    font-size: 0.85rem;
    box-shadow: 0 4px 24px rgba(232, 67, 45, 0.3);
  }

  .btn-primary:hover {
    background: #f0553e;
    transform: translateY(-1px);
    box-shadow: 0 6px 30px rgba(232, 67, 45, 0.45);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--surface);
    color: var(--text);
    border-color: var(--muted);
  }

  .btn-icon {
    width: 44px;
    height: 44px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }

  /* STATS ROW */
  .stats-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 380px;
  }

  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* CHART */
  .chart-wrap {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .chart-title {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* RIGHT PANEL */
  .right-panel {
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .task-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.1em;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 100px;
  }

  /* TASK INPUT */
  .task-input-row {
    display: flex;
    gap: 8px;
  }

  .task-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 11px 14px;
    border-radius: 10px;
    outline: none;
    transition: var(--transition);
  }

  .task-input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(232, 67, 45, 0.1);
  }

  .task-input::placeholder { color: var(--muted); }

  /* TASK LIST */
  .task-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    overflow-y: auto;
    max-height: 420px;
    padding-right: 4px;
  }

  .task-list::-webkit-scrollbar { width: 4px; }
  .task-list::-webkit-scrollbar-track { background: transparent; }
  .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: var(--transition);
    animation: slideIn 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(16px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: var(--transition);
  }

  .task-item:hover::before { background: var(--red); }
  .task-item:hover { border-color: rgba(232, 67, 45, 0.3); }

  .task-checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    font-size: 0.65rem;
  }

  .task-item.done .task-checkbox {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .task-item.done .task-checkbox::after { content: '✓'; }

  .task-text {
    flex: 1;
    font-size: 0.82rem;
    transition: var(--transition);
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 6px;
    border-radius: 4px;
    transition: var(--transition);
    opacity: 0;
  }

  .task-item:hover .task-delete { opacity: 1; }
  .task-delete:hover { color: var(--red); background: rgba(232, 67, 45, 0.1); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  .empty-icon { font-size: 2rem; margin-bottom: 8px; }

  /* STATUS BAR */
  .status-bar {
    grid-column: 1 / -1;
    padding: 12px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
  }

  .status-text {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 8px;
    transition: var(--transition);
  }

  .status-dot.active {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 1.5s infinite;
  }

  /* NOTIFICATION TOAST */
  .toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 0.8rem;
    color: var(--text);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto auto;
    }
    .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
    header { padding: 16px 20px; }
    .left-panel { padding: 28px 20px; }
    .right-panel { padding: 24px 20px; }
    .status-bar { padding: 10px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    Pomodoro Pro
  </div>
  <div class="session-badge">Sessions today: <span id="sessionCount">0</span></div>
</header>

<!-- LEFT PANEL: TIMER -->
<main class="left-panel">

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('focus', this)">Focus</button>
    <button class="mode-tab" onclick="setMode('short', this)">Short Break</button>
    <button class="mode-tab" onclick="setMode('long', this)">Long Break</button>
  </div>

  <div class="timer-container">
    <svg class="timer-svg" viewBox="0 0 280 280">
      <circle class="ring-track" cx="140" cy="140" r="120"/>
      <circle class="ring-progress" id="progress" cx="140" cy="140" r="120"/>
    </svg>
    <div class="timer-inner">
      <div class="time-display" id="time">25:00</div>
      <div class="mode-label" id="modeLabel">Focus Time</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-secondary btn-icon" onclick="resetTimer()" title="Reset">↺</button>
    <button class="btn btn-primary" id="startPauseBtn" onclick="toggleTimer()">Start</button>
    <button class="btn btn-secondary btn-icon" onclick="skipSession()" title="Skip">⏭</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="completedStat">0</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="minutesStat">0</div>
      <div class="stat-label">Minutes</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="streakStat">0</div>
      <div class="stat-label">Streak</div>
    </div>
  </div>

  <div class="chart-wrap">
    <div class="chart-title">Today's sessions</div>
    <canvas id="chart" height="100"></canvas>
  </div>

</main>

<!-- RIGHT PANEL: TASKS -->
<aside class="right-panel">

  <div class="panel-title">
    Tasks
    <span class="task-count" id="taskCount">0 tasks</span>
  </div>

  <div class="task-input-row">
    <input class="task-input" id="taskInput" placeholder="Add a new task…" onkeydown="if(event.key==='Enter') addTask()">
    <button class="btn btn-primary" onclick="addTask()" style="padding: 11px 18px; font-size: 0.75rem;">Add</button>
  </div>

  <ul class="task-list" id="taskList">
    <li class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      No tasks yet. Add one above!
    </li>
  </ul>

</aside>

<!-- STATUS BAR -->
<footer class="status-bar">
  <div class="status-text">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Ready to focus</span>
  </div>
  <div class="status-text">Pomodoro Pro · Stay in the zone</div>
</footer>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<audio id="alarm">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const MODES = {
  focus: { label: 'Focus Time', duration: 25 * 60, color: '#e8432d' },
  short: { label: 'Short Break', duration: 5 * 60, color: '#4caf7d' },
  long:  { label: 'Long Break',  duration: 15 * 60, color: '#f5c842' },
};

let currentMode = 'focus';
let time = MODES.focus.duration;
let total = MODES.focus.duration;
let timerInterval = null;
let running = false;
let sessions = 0;
let totalMinutes = 0;
let streak = 0;
let sessionHistory = Array(7).fill(0); // last 7 sessions slots

// ─── DOM REFS ─────────────────────────────────────────────────────────────────
const progressRing = document.getElementById('progress');
const timeDisplay = document.getElementById('time');
const modeLabelEl = document.getElementById('modeLabel');
const startPauseBtn = document.getElementById('startPauseBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const alarm = document.getElementById('alarm');

const CIRCUMFERENCE = 2 * Math.PI * 120; // r=120

// ─── TIMER CORE ──────────────────────────────────────────────────────────────
function updateDisplay() {
  const m = Math.floor(time / 60);
  const s = time % 60;
  timeDisplay.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
  document.title = `${m}:${s < 10 ? '0' : ''}${s} · Pomodoro Pro`;

  const pct = time / total;
  progressRing.style.strokeDashoffset = CIRCUMFERENCE - CIRCUMFERENCE * pct;
}

function toggleTimer() {
  if (running) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  running = true;
  startPauseBtn.textContent = 'Pause';
  statusDot.classList.add('active');
  statusText.textContent = `${MODES[currentMode].label} in progress…`;

  timerInterval = setInterval(() => {
    time--;
    updateDisplay();
    if (time <= 0) {
      clearInterval(timerInterval);
      running = false;
      onSessionComplete();
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
  running = false;
  startPauseBtn.textContent = 'Resume';
  statusDot.classList.remove('active');
  statusText.textContent = 'Paused';
}

function resetTimer() {
  clearInterval(timerInterval);
  running = false;
  time = total;
  startPauseBtn.textContent = 'Start';
  statusDot.classList.remove('active');
  statusText.textContent = 'Ready to focus';
  updateDisplay();
}

function skipSession() {
  clearInterval(timerInterval);
  running = false;
  time = 0;
  onSessionComplete();
}

function onSessionComplete() {
  startPauseBtn.textContent = 'Start';
  statusDot.classList.remove('active');

  if (currentMode === 'focus') {
    sessions++;
    totalMinutes += Math.round(MODES.focus.duration / 60);
    streak++;
    updateStats();
    sessionHistory.push(1);
    sessionHistory.shift();
    updateChart();
    showToast('🍅 Focus session complete! Take a break.');
    statusText.textContent = 'Session complete — great work!';
    alarm.play().catch(() => {});
  } else {
    showToast('☕ Break over — back to focus!');
    statusText.textContent = 'Break done — ready for more?';
  }
}

function setMode(mode, tabEl) {
  currentMode = mode;
  time = MODES[mode].duration;
  total = MODES[mode].duration;

  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');

  modeLabelEl.textContent = MODES[mode].label;
  progressRing.style.stroke = MODES[mode].color;

  clearInterval(timerInterval);
  running = false;
  startPauseBtn.textContent = 'Start';
  statusDot.classList.remove('active');
  statusText.textContent = 'Ready to focus';
  updateDisplay();
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('sessionCount').textContent = sessions;
  document.getElementById('completedStat').textContent = sessions;
  document.getElementById('minutesStat').textContent = totalMinutes;
  document.getElementById('streakStat').textContent = streak;
}

// ─── CHART ───────────────────────────────────────────────────────────────────
const ctx = document.getElementById('chart');
const chart = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['', '', '', '', '', '', 'Now'],
    datasets: [{
      label: 'Sessions',
      data: [...sessionHistory],
      backgroundColor: 'rgba(232, 67, 45, 0.7)',
      borderColor: '#e8432d',
      borderWidth: 1,
      borderRadius: 4,
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
    },
    scales: {
      y: {
        beginAtZero: true,
        ticks: { stepSize: 1, color: '#6b6260', font: { family: 'DM Mono', size: 10 } },
        grid: { color: '#2e2a2a' },
      },
      x: {
        ticks: { color: '#6b6260', font: { family: 'DM Mono', size: 10 } },
        grid: { display: false },
      }
    }
  }
});

function updateChart() {
  chart.data.datasets[0].data = [...sessionHistory];
  chart.update();
}

// ─── TASKS ───────────────────────────────────────────────────────────────────
let tasks = loadTasksFromStorage();

function renderTasks() {
  const list = document.getElementById('taskList');
  const empty = document.getElementById('emptyState');

  // Clear existing task items (keep empty state)
  list.querySelectorAll('.task-item').forEach(el => el.remove());

  if (tasks.length === 0) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tasks.forEach((task, i) => {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' done' : '');
      li.innerHTML = `
        <div class="task-checkbox"></div>
        <span class="task-text">${escapeHtml(task.text)}</span>
        <button class="task-delete" onclick="deleteTask(${i}, event)" title="Delete">✕</button>
      `;
      li.querySelector('.task-checkbox').addEventListener('click', () => toggleTask(i));
      li.querySelector('.task-text').addEventListener('click', () => toggleTask(i));
      list.appendChild(li);
    });
  }

  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  document.getElementById('taskCount').textContent =
    total === 0 ? '0 tasks' : `${done}/${total} done`;
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;

  tasks.push({ text, done: false });
  input.value = '';
  saveTasksToStorage();
  renderTasks();
}

function toggleTask(index) {
  tasks[index].done = !tasks[index].done;
  if (tasks[index].done) streak = Math.max(streak, streak); // keep streak
  saveTasksToStorage();
  renderTasks();
}

function deleteTask(index, event) {
  event.stopPropagation();
  tasks.splice(index, 1);
  saveTasksToStorage();
  renderTasks();
}

function saveTasksToStorage() {
  try { localStorage.setItem('pp_tasks', JSON.stringify(tasks)); } catch(e) {}
}

function loadTasksFromStorage() {
  try { return JSON.parse(localStorage.getItem('pp_tasks')) || []; } catch(e) { return []; }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 3500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateDisplay();
renderTasks();
</script>
</body>
</html>
